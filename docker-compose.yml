services:
  credit-default-api:
    build: .
    image: batonhleba/mephi_ml:latest
    ports:
      - "5000:5000"
    environment:
      - MODEL_DIR=/app/models
      - API_LOG_PATH=/app/logs/api_requests.jsonl
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
